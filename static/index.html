<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Claude Issue Tracker</title>
<style>
  :root {
    --bg: #1d2021; --panel: #282828; --border: #3c3836;
    --fg: #ebdbb2; --muted: #928374; --accent: #83a598;
    --green: #98971a; --red: #cc241d;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 13px/1.4 -apple-system, "SF Pro Text", system-ui, sans-serif;
    display: grid;
    grid-template-columns: var(--sidebar-w, 380px) 4px 1fr;
    height: 100vh;
  }
  body.resizing { cursor: col-resize; user-select: none; }
  body.resizing iframe { pointer-events: none; }
  .resizer {
    background: transparent;
    cursor: col-resize;
    position: relative;
  }
  .resizer:hover, .resizer.dragging { background: var(--accent); }
  aside {
    border-right: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  header {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.15);
  }
  header h1 { margin: 0; font-size: 13px; font-weight: 600; color: var(--fg); }
  header button {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 3px 7px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  header button:hover { color: var(--fg); border-color: var(--accent); }
  ul#issues, ul#inactive-issues, ul#other-sessions { list-style: none; padding: 0; margin: 0; }
  /* Section headers (foldout summaries + plain). Distinct bar with tinted bg. */
  .section-header {
    padding: 8px 14px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg);
    background: rgba(0,0,0,0.18);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  details.foldout > summary {
    list-style: none; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 6px;
  }
  details.foldout > summary::-webkit-details-marker { display: none; }
  details.foldout > summary::before {
    content: "▸"; font-size: 9px; color: var(--muted);
    transition: transform 0.1s;
  }
  details.foldout[open] > summary::before { transform: rotate(90deg); }
  details.foldout > summary:hover { background: rgba(0,0,0,0.28); }
  details.foldout > summary:hover::before { color: var(--fg); }
  .section-header .count { color: var(--muted); font-weight: 500; margin-left: 2px; }
  body.no-glab header h1,
  body.no-glab ul#issues,
  body.no-glab #inactive-section { display: none !important; }
  li.issue {
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; display: flex; gap: 8px; align-items: flex-start;
  }
  li.issue:hover { background: rgba(255,255,255,0.03); }
  li.issue.active { background: rgba(79,140,255,0.1); border-left: 2px solid var(--accent); padding-left: 12px; }
  .dot { flex: 0 0 8px; height: 8px; width: 8px; border-radius: 50%; margin-top: 5px; background: var(--muted); }
  .dot.alive { background: var(--green); }
  /* Claude session states (overrides .alive when present). */
  .dot.claude-idle    { background: var(--accent); }
  .dot.claude-working { background: var(--yellow, #d79921); animation: pulse 1.2s ease-in-out infinite; }
  .dot.claude-waiting { background: var(--red); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .meta .sub .state { text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }
  .state.claude-idle    { color: var(--accent); }
  .state.claude-working { color: #d79921; }
  .state.claude-waiting { color: var(--red); }
  .meta { flex: 1; min-width: 0; }
  .meta .title { font-weight: 500; color: var(--fg); display: block; word-wrap: break-word; }
  .meta .sub { color: var(--muted); font-size: 11px; margin-top: 2px; display: flex; gap: 8px; align-items: center; }
  .meta .sub a { color: var(--muted); text-decoration: none; }
  .meta .sub a:hover { color: var(--accent); }
  .meta .iid { color: var(--muted); font-weight: 400; text-decoration: none; margin-right: 4px; }
  .meta .iid:hover { color: var(--accent); }
  .mr-row { gap: 4px !important; flex-wrap: wrap; }
  .mr-link {
    font-size: 10px; padding: 1px 5px; border-radius: 3px;
    text-decoration: none; font-weight: 500;
    background: rgba(79,140,255,0.12); color: var(--accent);
  }
  .mr-link:hover { background: rgba(79,140,255,0.25); }
  .mr-link.mr-merged { background: rgba(100,200,100,0.12); color: var(--green); }
  .mr-link.mr-merged:hover { background: rgba(100,200,100,0.25); }
  .mr-link.mr-closed { background: rgba(200,100,100,0.12); color: var(--red); opacity: 0.7; }
  .mr-link.mr-closed:hover { background: rgba(200,100,100,0.25); }
  main { display: flex; flex-direction: column; min-width: 0; }
  main .placeholder {
    margin: auto; color: var(--muted); text-align: center;
  }
  iframe { border: 0; flex: 1; width: 100%; background: black; }
  .pane { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .pane.active { display: flex; }
  .toolbar {
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center; background: var(--panel);
  }
  .toolbar .title { font-weight: 500; }
  .toolbar .url { color: var(--muted); font-size: 12px; }
  .toolbar a { color: var(--accent); text-decoration: none; font-size: 12px; }
  .toolbar button {
    background: transparent; color: var(--accent); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 4px; font-size: 12px; cursor: pointer;
  }
  .toolbar button:hover:not(:disabled) { border-color: var(--accent); }
  .toolbar button:disabled { color: var(--muted); cursor: default; }
  .err { color: var(--red); padding: 16px; }
  .hdr-actions { display: flex; gap: 6px; }
  #keys-help { min-width: 26px; padding: 4px 8px; font-weight: 600; }
  #keybindings-help {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .kb-help-inner {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px 24px;
    min-width: 360px; max-width: 540px; color: var(--fg); font-size: 13px;
  }
  .kb-help-inner h2 {
    margin: 0 0 12px 0; font-size: 14px; color: var(--accent); font-weight: 600;
  }
  .kb-help-inner .kb-rows { margin: 4px 0 12px 0; }
  .kb-help-inner .kb-row {
    display: grid; grid-template-columns: 180px 1fr; gap: 12px;
    padding: 4px 0; align-items: baseline;
  }
  .kb-help-inner kbd {
    font-family: "Hack Nerd Font Mono", ui-monospace, monospace; font-size: 12px;
    color: var(--fg); background: var(--bg); border: 1px solid var(--border);
    padding: 2px 6px; border-radius: 3px; justify-self: start;
  }
  .kb-help-inner .kb-sep { color: var(--muted); font-family: inherit; font-size: 11px; }
  .kb-help-inner span { color: var(--muted); }
  .kb-help-inner p {
    color: var(--muted); font-size: 11px; margin: 10px 0 0 0; line-height: 1.55;
  }
  .kb-help-inner code {
    background: var(--bg); border: 1px solid var(--border);
    padding: 1px 5px; border-radius: 3px; font-size: 11px;
    color: var(--fg); font-family: "Hack Nerd Font Mono", ui-monospace, monospace;
  }
  .kb-help-inner em { font-style: italic; color: var(--muted); }
  #session-switcher {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 12vh; z-index: 110;
  }
  .ss-inner {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; width: min(560px, 92vw);
    max-height: 70vh; display: flex; flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45); overflow: hidden;
  }
  #ss-input {
    appearance: none; background: var(--bg); color: var(--fg);
    border: 0; border-bottom: 1px solid var(--border);
    padding: 12px 16px; font-size: 14px; outline: none;
    font-family: inherit;
  }
  #ss-list {
    list-style: none; padding: 4px 0; margin: 0;
    overflow-y: auto; flex: 1;
  }
  .ss-item {
    padding: 8px 16px; cursor: pointer; border-left: 2px solid transparent;
  }
  .ss-item:hover { background: rgba(255,255,255,0.03); }
  .ss-item.selected {
    background: rgba(79,140,255,0.12); border-left-color: var(--accent);
  }
  .ss-item.disabled { opacity: 0.4; cursor: not-allowed; }
  .ss-title { color: var(--fg); font-size: 13px; }
  .ss-sub   { color: var(--muted); font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
<aside>
  <header>
    <h1>Issues</h1>
    <div class="hdr-actions">
      <button id="keys-help" title="Keybindings (?)">?</button>
      <button id="refresh">Refresh</button>
    </div>
  </header>
  <ul id="issues"><li style="padding: 16px; color: var(--muted);">Loading…</li></ul>
  <details class="foldout" id="inactive-section" style="display:none">
    <summary class="section-header">Other <span class="count" id="inactive-count"></span></summary>
    <ul id="inactive-issues"></ul>
  </details>
  <details class="foldout" id="other-section" open style="display:none">
    <summary class="section-header">Tmux sessions <span class="count" id="other-count"></span></summary>
    <ul id="other-sessions"></ul>
  </details>
</aside>
<div class="resizer" id="resizer" title="Drag to resize"></div>
<main id="main">
  <div class="placeholder" id="placeholder">Select an issue to open its Claude session</div>
</main>
<script src="/static/app.js"></script>
<script src="/static/keybindings.js"></script>
</body>
</html>
